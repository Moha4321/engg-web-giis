<!-- --- START OF FILE members.html --- -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personnel | Engineering Club</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="extend.css">
</head>
<body class="graph-paper scanlines">
  
  <!-- 3D Background (Persists across pages) -->
  <canvas id="webgl-canvas"></canvas>
  <div class="cursor"><div class="cursor__ring"></div><div class="cursor__h"></div><div class="cursor__v"></div></div>

  <!-- NAVIGATION -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo"><span class="nav__logo-glyph"></span> ENG_CLUB</a>
      <ul class="nav__links">
        <li><a href="index.html" class="nav__link">System.Aim</a></li>
        <li><a href="members.html" class="nav__link is-active">Personnel</a></li>
        <li><a href="sessions.html" class="nav__link">Mission.Logs</a></li>
      </ul>
      <div class="nav__clock nav__clock--active u-ml-auto" id="dseg-clock">00:00:00</div>
    </div>
  </nav>

  <div class="content-wrapper" style="padding-top: 120px; padding-bottom: 100px;">
    <main class="container">
      
      <!-- COMMAND STAFF (OPERATORS) -->
      <section class="section section--tight">
        <div class="section__header">
          <div class="section__eyebrow"><span class="section__eyebrow-line"></span><span class="section__eyebrow-text">LEVEL 01 CLEARANCE</span></div>
          <h1 class="display-md text-orange">Command Staff</h1>
        </div>
        <!-- ENGINE.JS WILL INJECT OPERATORS HERE -->
        <div id="operators-grid" class="operators-grid"></div>
      </section>

      <!-- FLIGHT CREW (MEMBERS) -->
      <section class="section section--tight mt-8">
        <div class="section__header">
          <div class="section__eyebrow"><span class="section__eyebrow-line"></span><span class="section__eyebrow-text">LEVEL 02 CLEARANCE</span></div>
          <h2 class="display-md text-blue">Flight Crew</h2>
        </div>
        <!-- ENGINE.JS WILL INJECT CREW HERE -->
        <div id="crew-grid" class="crew-grid mt-4"></div>
      </section>

    </main>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
  </script>
  <script type="module" src="main.js"></script>
  <script type="module" src="engine.js"></script>
  <script>
    const cursor = document.querySelector('.cursor');
    document.addEventListener('mousemove', e => { cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`; });
    setInterval(() => { const d = new Date(); document.getElementById('dseg-clock').textContent = d.toLocaleTimeString('en-GB'); }, 1000);
  </script>
</body>
</html>
