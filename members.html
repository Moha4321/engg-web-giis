<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Engg Club LAB — Engineering Formation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Playfair+Display:ital,wght@1,400;1,500;1,600&display=swap">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="extend.css">

  <style>
    /* ── PAGE BODY ── */
    html, body {
      margin: 0; padding: 0;
      background: #030308;
      overflow-x: hidden;
    }

    /* ── FULL-SCREEN SCENE ── */
    #scene-wrap {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    canvas#scene {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 32px;
      height: 52px;
      background: rgba(3,3,8,0.88);
      border-bottom: 1px solid var(--border-subtle);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .nav__logo {
      font-family: var(--font-display);
      font-size: 1.1rem;
      letter-spacing: .2em;
      color: var(--orange);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-right: auto;
    }

    .nav__logo-glyph::before {
      content: '⬡';
      font-size: .9rem;
    }

    .nav__clock {
      font-family: var(--font-mono);
      font-size: .75rem;
      color: var(--text-tertiary);
      letter-spacing: .12em;
    }

    /* ── HUD — top-left counter ── */
    #hud-wrap {
      position: fixed;
      top: 64px;
      left: 24px;
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
    }

    .hud-line {
      font-family: var(--font-mono);
      font-size: .62rem;
      letter-spacing: .18em;
      color: var(--text-tertiary);
      text-transform: uppercase;
    }

    .hud-val {
      color: var(--orange);
      margin-right: 6px;
    }

    /* ── HOVER TOOLTIP ── */
    #hud-hover {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transition: opacity .25s;
    }

    #hud-hover-text {
      font-family: var(--font-mono);
      font-size: .72rem;
      letter-spacing: .14em;
      color: var(--text-primary);
      background: rgba(3,3,8,.92);
      border: 1px solid var(--border-mid);
      padding: 6px 16px;
      border-radius: 2px;
      white-space: nowrap;
    }

    /* ── HINT label ── */
    #hud-hint {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 50;
      text-align: right;
      pointer-events: none;
      transition: opacity .4s;
    }

    #hud-hint span {
      display: block;
      font-family: var(--font-mono);
      font-size: .6rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    /* ── MEMBER CARD (slides up from bottom) ── */
    #member-card {
      position: fixed;
      bottom: -600px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      width: min(520px, calc(100vw - 32px));
      transition: bottom .45s cubic-bezier(.25,.46,.45,.94);
    }

    #member-card-inner {
      background: rgba(13,13,28,.97);
      border: 1px solid var(--border-mid);
      border-top: 3px solid var(--orange);
      border-radius: var(--radius-lg);
      padding: 24px 28px 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,.8);
      max-height: 70vh;
      overflow-y: auto;
    }

    #member-card-inner::-webkit-scrollbar { width: 3px; }
    #member-card-inner::-webkit-scrollbar-thumb { background: var(--border-mid); }

    /* ── BACK BUTTON ── */
    #btn-back {
      display: none;
      position: fixed;
      top: 64px;
      right: 24px;
      z-index: 200;
      font-family: var(--font-mono);
      font-size: .65rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--text-secondary);
      background: rgba(13,13,28,.9);
      border: 1px solid var(--border-mid);
      padding: 8px 18px;
      border-radius: 2px;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }

    #btn-back:hover {
      color: var(--orange);
      border-color: var(--orange);
    }

    /* ── DOMAIN LEGEND (bottom-left) ── */
    #domain-legend {
      position: fixed;
      bottom: 32px;
      left: 24px;
      z-index: 50;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: .6rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    .legend-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── MOBILE TOUCH ── */
    canvas#scene { touch-action: none; }

    @media (max-width: 600px) {
      .cursor { display: none !important; }
      * { cursor: auto !important; }
      #domain-legend { display: none; }
      #member-card { width: calc(100vw - 16px); }
      #member-card-inner { padding: 18px 16px 16px; }
    }
  </style>
</head>
<body>

<!-- ── CUSTOM CURSOR ── -->
<div class="cursor" id="cursor">
  <div class="cursor__ring"></div>
  <div class="cursor__h"></div>
  <div class="cursor__v"></div>
</div>

<!-- ── NAVIGATION ── -->
<nav class="nav">
  <a href="#" class="nav__logo">
    <span class="nav__logo-glyph"></span>
    ENGG LAB
  </a>
  <div class="nav__clock" id="navClock">00:00:00</div>
  <div class="nav__inner">
      <!-- <a href="index.html" class="nav__logo"><span class="nav__logo-glyph"></span> ENG_CLUB</a> -->
      <ul class="nav__links">
        <li><a href="index.html" class="nav__link">System.Aim</a></li>
        <li><a href="members.html" class="nav__link is-active">Personnel</a></li>
        <li><a href="sessions.html" class="nav__link">Mission.Logs</a></li>
      </ul>
    </div>
</nav>

<!-- ── SCENE CANVAS ── -->
<div id="scene-wrap">
  <canvas id="scene"></canvas>
</div>

<!-- ── HUD COUNTERS ── -->
<div id="hud-wrap">
  <div class="hud-line"><span class="hud-val" id="hud-core">0</span> CORE OPERATORS</div>
  <div class="hud-line"><span class="hud-val" id="hud-orb">0</span> ORBITING MEMBERS</div>
</div>

<!-- ── HOVER TOOLTIP ── -->
<div id="hud-hover">
  <div id="hud-hover-text"></div>
</div>

<!-- ── INTERACTION HINT ── -->
<div id="hud-hint">
  <span>DRAG TO ROTATE</span>
  <span style="margin-top:2px;">CLICK A NODE FOR DETAILS</span>
</div>

<!-- ── BACK BUTTON ── -->
<button id="btn-back" onclick="resetCamera()">← BACK</button>

<!-- ── DOMAIN LEGEND ── -->
<div id="domain-legend">
  <div class="legend-item">
    <div class="legend-dot" style="background:#FF6B00;box-shadow:0 0 6px #FF6B00;"></div>
    FLUID DYNAMICS
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#4499DD;box-shadow:0 0 6px #4499DD;"></div>
    ML + ENGINEERING
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#00CC66;box-shadow:0 0 6px #00CC66;"></div>
    STRUCTURAL / FEM
  </div>
</div>

<!-- ── MEMBER CARD ── -->
<div id="member-card">
  <div id="member-card-inner">
    <div id="card-content"></div>
  </div>
</div>

<!-- ── TEAM.JS ── -->
<script src="team.js"></script>

</body>
</html>
