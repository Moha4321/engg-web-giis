<!-- --- START OF FILE sessions.html --- -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Logs | Engineering Club</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="extend.css">
</head>
<body class="graph-paper scanlines">
  
  <canvas id="webgl-canvas"></canvas>
  <div class="cursor"><div class="cursor__ring"></div><div class="cursor__h"></div><div class="cursor__v"></div></div>

  <!-- NAVIGATION -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo"><span class="nav__logo-glyph"></span> ENG_CLUB</a>
      <ul class="nav__links">
        <li><a href="index.html" class="nav__link">System.Aim</a></li>
        <li><a href="members.html" class="nav__link">Personnel</a></li>
        <li><a href="sessions.html" class="nav__link is-active">Mission.Logs</a></li>
      </ul>
      <div class="nav__clock nav__clock--active u-ml-auto" id="dseg-clock">00:00:00</div>
    </div>
  </nav>

  <div class="content-wrapper" style="padding-top: 120px; padding-bottom: 100px;">
    <main class="container--narrow u-ml-auto u-mr-auto">
      
      <div class="section__header">
        <div class="section__eyebrow"><span class="section__eyebrow-line"></span><span class="section__eyebrow-text">ARCHIVE ACCESS</span></div>
        <h1 class="display-lg text-primary">Mission Logs</h1>
        <p class="text-secondary text-lg mt-2">Historical telemetry, parameters, and post-mortem analyses of all club engineering drops.</p>
      </div>

      <!-- ENGINE.JS WILL INJECT SESSIONS TIMELINE HERE -->
      <div id="sessions-timeline" class="timeline-wrapper"></div>

    </main>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
  </script>
  <script type="module" src="main.js"></script>
  <script type="module" src="engine.js"></script>
  <script>
    const cursor = document.querySelector('.cursor');
    document.addEventListener('mousemove', e => { cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`; });
    setInterval(() => { const d = new Date(); document.getElementById('dseg-clock').textContent = d.toLocaleTimeString('en-GB'); }, 1000);
  </script>
</body>
</html>
