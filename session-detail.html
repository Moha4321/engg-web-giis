  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }

  <script>
    const cursor = document.querySelector('.cursor');
    document.addEventListener('mousemove', e => { cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`; });
    setInterval(() => { const d = new Date(); document.getElementById('dseg-clock').textContent = d.toLocaleTimeString('en-GB'); }, 1000);

    // Re-trigger GSAP animations
window.addEventListener('EngineDOMReady', () => {
        const script = document.createElement('script');
        script.src = 'animation.js';
        document.body.appendChild(script);
        
        // Page load animations
// Page load animations with safety checks
        setTimeout(() => {
            if (document.querySelector('.team-log')) {
                gsap.from('.team-log', { opacity: 0, y: 30, stagger: 0.2, duration: 0.8, ease: "power2.out" });
            }
            if (document.querySelector('.media-item')) {
                gsap.from('.media-item', { opacity: 0, scale: 0.9, stagger: 0.1, duration: 0.5, delay: 0.4 });
            }
            if (document.querySelector('.presentation-wrapper')) {
                gsap.from('.presentation-wrapper', { opacity: 0, y: 40, duration: 1, ease: "power3.out" });
            }
        }, 150);

        // --- CAROUSEL ANIMATION LOGIC ---
        const slides = gsap.utils.toArray('.sci-carousel__slide');
        if(slides.length > 0) {
            let currentIndex = 0;
            let isAnimating = false;
            const total = slides.length;
            const currentUI = document.getElementById('sci-current');
            const progressBar = document.querySelector('.sci-carousel__progress-bar');

            // Setup starting frame
            gsap.set(slides, { autoAlpha: 0, scale: 1.1 });
            gsap.set(slides[0], { autoAlpha: 1, scale: 1 });
            updateUI(0);

            function updateUI(index) {
                if(currentUI) currentUI.innerText = String(index + 1).padStart(2, '0');
                if(progressBar) progressBar.style.width = `${((index + 1) / total) * 100}%`;
            }

            function goToSlide(nextIndex, direction) {
                if (isAnimating || nextIndex === currentIndex) return;
                isAnimating = true;

                const currentSlide = slides[currentIndex];
                const nextSlide = slides[nextIndex];

                // Data-wipe clip path logic
                const clipStart = direction === 1 ? 'polygon(100% 0%, 100% 0%, 100% 100%, 100% 100%)' : 'polygon(0% 0%, 0% 0%, 0% 100%, 0% 100%)';
                const clipEnd = 'polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%)';
                const clipExit = direction === 1 ? 'polygon(0% 0%, 0% 0%, 0% 100%, 0% 100%)' : 'polygon(100% 0%, 100% 0%, 100% 100%, 100% 100%)';

                // Prep next slide
                gsap.set(nextSlide, { autoAlpha: 1, scale: 1.1, clipPath: clipStart, zIndex: 2 });
                gsap.set(currentSlide, { zIndex: 1 });

                const tl = gsap.timeline({
                    onComplete: () => {
                        gsap.set(currentSlide, { autoAlpha: 0, clearProps: "clipPath" });
                        currentIndex = nextIndex;
                        isAnimating = false;
                    }
                });

                // Smooth wipe out + shrink
                tl.to(currentSlide, { scale: 0.9, clipPath: clipExit, duration: 0.8, ease: "power3.inOut" }, 0);
                // Smooth wipe in + lock scale
                tl.to(nextSlide, { scale: 1, clipPath: clipEnd, duration: 0.8, ease: "power3.inOut" }, 0);

                updateUI(nextIndex);
            }

            document.querySelector('.sci-btn--next').addEventListener('click', () => {
                goToSlide((currentIndex + 1) % total, 1);
            });

            document.querySelector('.sci-btn--prev').addEventListener('click', () => {
                goToSlide((currentIndex - 1 + total) % total, -1);
            });
        }
    });
    
  
  </script>
