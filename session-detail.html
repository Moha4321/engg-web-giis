<!-- --- START OF FILE session-detail.html --- -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive Data | Engineering Club</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="extend.css">
</head>
<body class="graph-paper scanlines">
  
  <canvas id="webgl-canvas"></canvas>
  <div class="cursor"><div class="cursor__ring"></div><div class="cursor__h"></div><div class="cursor__v"></div></div>

  <!-- NAVIGATION -->
  <nav class="nav">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo"><span class="nav__logo-glyph"></span> ENG_CLUB</a>
      <ul class="nav__links">
        <li><a href="index.html" class="nav__link">System.Aim</a></li>
        <li><a href="members.html" class="nav__link">Personnel</a></li>
        <li><a href="sessions.html" class="nav__link is-active">Mission.Logs</a></li>
      </ul>
      <div class="nav__clock nav__clock--active u-ml-auto" id="dseg-clock">00:00:00</div>
    </div>
  </nav>

  <div class="content-wrapper" style="padding-top: 100px; padding-bottom: 100px;">
    <!-- WE INJECT EVERYTHING INTO THIS MAIN TAG -->
    <main class="container--narrow u-ml-auto u-mr-auto" id="session-detail-inject">
        <!-- Content gets built here by engine.js -->
    </main>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/gsap@3/dist/SplitText.min.js"></script>
  <script src="https://unpkg.com/gsap@3/dist/ScrambleTextPlugin.min.js"></script>
  
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
  </script>
  <script type="module" src="main.js"></script>
  <script type="module" src="engine.js"></script>
  
  <script>
    const cursor = document.querySelector('.cursor');
    document.addEventListener('mousemove', e => { cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`; });
    setInterval(() => { const d = new Date(); document.getElementById('dseg-clock').textContent = d.toLocaleTimeString('en-GB'); }, 1000);

    // Re-trigger GSAP animations
    window.addEventListener('EngineDOMReady', () => {
        const script = document.createElement('script');
        script.src = 'animation.js';
        document.body.appendChild(script);
        
        // Custom animation just for the detail page
        setTimeout(() => {
            gsap.from('.team-log', { opacity: 0, y: 30, stagger: 0.2, duration: 0.8, ease: "power2.out" });
            gsap.from('.media-item', { opacity: 0, scale: 0.9, stagger: 0.1, duration: 0.5, delay: 0.4 });
            gsap.from('.presentation-wrapper', { opacity: 0, y: 40, duration: 1, ease: "power3.out" });
        }, 150);
    });
  </script>
</body>
</html>
